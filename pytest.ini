[pytest]
# Only collect the top-level tests/ — ml/ is a git submodule with its
# own tests/conftest.py and same module name, which causes pytest's
# rootdir import-mode to blow up with ImportPathMismatchError.
testpaths = tests
norecursedirs = ml accelerator docker docs launchd scripts ffmpeg-proxy thumbnail

markers =
    db: tests that require a live Postgres connection to the Immich database
    slow: integration tests that create venvs or hit the network (skipped by default in CI fast runs)
