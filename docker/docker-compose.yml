services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:release
    volumes:
      - /path/to/your/upload:/usr/src/app/upload          # CHANGE THIS: Immich upload directory
      - /path/to/your/photos:/mnt/photos:ro                # CHANGE THIS: external photo library
      - /path/to/your/ffmpeg-wrapper.sh:/usr/bin/ffmpeg:ro # CHANGE THIS: ffmpeg proxy wrapper
      - /path/to/your/ffprobe-wrapper.sh:/usr/bin/ffprobe:ro # CHANGE THIS: ffprobe proxy wrapper
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=immich_postgres
      - IMMICH_MACHINE_LEARNING_URL=http://host.internal:3004
      - IMMICH_WORKERS_EXCLUDE=thumbnailGeneration  # native thumbnail worker handles this
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}  # set in .env file or export before running
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich_redis
    depends_on:
      - redis
      - database
    restart: unless-stopped
    ports:
      - "2283:2283"

  # ML runs natively on macOS for GPU/Neural Engine acceleration (see ml/)
  # Video transcoding runs natively via ffmpeg proxy for VideoToolbox (see ffmpeg-proxy/)

  redis:
    container_name: immich_redis
    image: redis:6.2-alpine
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping || exit 1

  database:
    container_name: immich_postgres
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}  # set in .env file or export before running
      - POSTGRES_USER=postgres
      - POSTGRES_DB=immich
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"  # localhost only — for native thumbnail worker
    healthcheck:
      test: pg_isready --dbname=immich
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
