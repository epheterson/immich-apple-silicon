name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check
        run: python -m py_compile immich_accelerator/__init__.py
      - name: Run pytest (fast)
        run: |
          pip install pytest
          pytest -v -m "not slow"

  fresh-install-macos:
    # Runs on a clean macOS Apple Silicon runner — no global pip
    # packages, no leftover venvs. Catches the "works on my machine"
    # class of bug (issue #17: dashboard ModuleNotFoundError) before
    # it reaches users. The slow marker enables the venv+pip
    # integration test that builds a pristine fastapi+uvicorn env.
    #
    # EMERGENCY OVERRIDE: if macos-14 runners become flaky and this
    # blocks a release, trigger `update-homebrew.yml` manually via
    # `gh workflow run update-homebrew.yml -f tag=vX.Y.Z` — that
    # workflow bypasses CI entirely.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install pytest only (simulate fresh Mac)
        run: pip install pytest
      - name: Run fast fresh-install regression checks
        run: pytest -v tests/test_fresh_install.py -m "not slow"
      - name: Run slow integration test (real venv + pip install)
        # Separate step so a failure here is still visible as
        # "slow step failed" rather than masking the fast ones.
        run: pytest -v tests/test_fresh_install.py -m slow

  auto-tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, fresh-install-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for version bump and tag
        id: tag
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists — skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version ${VERSION} — creating tag"
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create draft release with changelog
        if: steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.tag.outputs.tag }}
        run: |
          VERSION="${TAG_NAME#v}"
          # Find the previous release tag to capture all changelog sections since then
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          PREV_VERSION="${PREV_TAG#v}"
          if [ -n "$PREV_VERSION" ]; then
            # Extract all changelog sections from current version down to previous release
            NOTES=$(awk "/^## ${PREV_VERSION}[[:space:]]/{exit} /^## ${VERSION}[[:space:]]/{found=1; next} found{print}" CHANGELOG.md)
          else
            # First release — grab everything after the first ## heading
            NOTES=$(awk "/^## ${VERSION}[[:space:]]/{found=1; next} found{print}" CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG_NAME}"
          fi
          cat > /tmp/release-notes.md << ENDNOTES
          ${NOTES}

          ### Upgrade
          \`\`\`bash
          brew upgrade immich-accelerator
          immich-accelerator setup   # if first time or new features require it
          \`\`\`
          ENDNOTES
          sed -i 's/^          //' /tmp/release-notes.md
          gh release create "${TAG_NAME}" \
            --latest \
            --title "Immich Accelerator ${TAG_NAME}" \
            --notes-file /tmp/release-notes.md
      - name: Trigger Homebrew formula update
        if: steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.tag.outputs.tag }}
        run: |
          gh workflow run update-homebrew.yml -f tag="$TAG_NAME"
